<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opening Circles...</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        .container {
            text-align: center;
            padding: 2rem;
            max-width: 400px;
        }
        .logo {
            width: 80px;
            height: 80px;
            margin: 0 auto 2rem;
            background: white;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 40px;
        }
        h1 {
            font-size: 1.5rem;
            margin-bottom: 1rem;
        }
        p {
            opacity: 0.9;
            margin-bottom: 2rem;
            font-size: 1rem;
        }
        .button {
            display: inline-block;
            padding: 12px 30px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 25px;
            font-weight: 600;
            margin: 0.5rem;
            transition: transform 0.2s;
        }
        .button:hover {
            transform: scale(1.05);
        }
        .button.secondary {
            background: rgba(255, 255, 255, 0.2);
            color: white;
            border: 2px solid white;
        }
        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.3);
            border-top: 3px solid white;
            border-radius: 50%;
            width: 30px;
            height: 30px;
            animation: spin 1s linear infinite;
            margin: 2rem auto;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .hidden {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">⭕</div>
        
        <div id="loading-state">
            <h1>Opening Circles...</h1>
            <div class="spinner"></div>
            <p>Redirecting to the app</p>
        </div>
        
        <div id="fallback-state" class="hidden">
            <h1>Open in Circles App</h1>
            <p>View your daily summary and stay connected with your network</p>
            <a href="#" id="open-app-btn" class="button">Open in App</a>
            <a href="https://apps.apple.com/us/app/favcircles/id6746807095" class="button secondary">Download App</a>
        </div>
    </div>
    
    <script>
        // Get the redirect path from URL parameter
        const urlParams = new URLSearchParams(window.location.search);
        const redirectPath = urlParams.get('path') || 'daily-summary';
        const deepLink = 'circles://' + redirectPath;
        
        // Store whether we've successfully opened the app
        let appOpened = false;
        
        // Function to attempt opening the app
        function attemptAppOpen() {
            // Try to open the app using the custom URL scheme
            window.location.href = deepLink;
            
            // Set a flag that we've attempted to open
            appOpened = true;
            
            // After a delay, check if we're still on this page
            setTimeout(function() {
                // If we're still here, the app probably isn't installed
                if (!document.hidden && appOpened) {
                    showFallback();
                }
            }, 2500);
        }
        
        // Function to show fallback UI
        function showFallback() {
            document.getElementById('loading-state').classList.add('hidden');
            document.getElementById('fallback-state').classList.remove('hidden');
        }
        
        // Set up the manual open button
        document.getElementById('open-app-btn').addEventListener('click', function(e) {
            e.preventDefault();
            window.location.href = deepLink;
            
            // After attempting to open, show download option more prominently
            setTimeout(function() {
                if (!document.hidden) {
                    window.location.href = 'https://apps.apple.com/us/app/favcircles/id6746807095';
                }
            }, 1000);
        });
        
        // Listen for page visibility changes
        document.addEventListener('visibilitychange', function() {
            if (document.hidden) {
                // Page is hidden, app likely opened successfully
                appOpened = true;
            }
        });
        
        // Attempt to open the app immediately
        attemptAppOpen();
        
        // Also try using a hidden iframe as a fallback method
        setTimeout(function() {
            if (!appOpened && !document.hidden) {
                const iframe = document.createElement('iframe');
                iframe.style.display = 'none';
                iframe.src = deepLink;
                document.body.appendChild(iframe);
                
                setTimeout(function() {
                    document.body.removeChild(iframe);
                }, 100);
            }
        }, 500);
    </script>
</body>
</html>
